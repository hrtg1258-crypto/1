<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐家人格测试 | Musician Personality Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-100">

    <div id="app" class="w-full max-w-2xl">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="glass rounded-[2.5rem] p-10 md:p-16 shadow-2xl text-center fade-in">
            <div class="mb-8 flex justify-center">
                <div class="bg-indigo-600 p-4 rounded-3xl shadow-lg rotate-3">
                    <i data-lucide="music" class="w-12 h-12 text-white"></i>
                </div>
            </div>
            <h1 class="serif text-4xl md:text-5xl font-bold text-slate-800 mb-6 tracking-tight">音乐家人格测试</h1>
            <p class="text-slate-600 text-lg md:text-xl mb-10 leading-relaxed max-w-md mx-auto">
                25位古典乐巨匠，谁才是你灵魂深处的映射？<br>
                探索属于你的音乐基因。
            </p>
            <div class="mb-8">
                <div class="inline-flex p-1 rounded-full bg-white/60 border border-white/60 shadow-sm">
                    <button id="mode-standard" onclick="setQuizMode('standard')" class="px-6 py-2 rounded-full text-sm font-bold transition-colors">
                        标准模式
                    </button>
                    <button id="mode-simple" onclick="setQuizMode('simple')" class="px-6 py-2 rounded-full text-sm font-bold transition-colors">
                        简单模式
                    </button>
                </div>
                <div id="mode-desc" class="mt-3 text-slate-400 text-sm font-medium"></div>
            </div>
            <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-5 rounded-full text-xl font-bold transition-all transform hover:scale-105 shadow-xl flex items-center justify-center mx-auto gap-3">
                开启探索之旅
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </button>
            
            <div class="mt-8">
                <!-- 数据看板入口：为了避免“剧透”，点击后先弹出确认框，再决定是否进入 list.html -->
                <a id="dashboard-link" href="list.html" onclick="openDashboardGate(event)" class="inline-flex items-center gap-2 text-slate-400 hover:text-indigo-600 text-sm font-medium transition-colors">
                    <i data-lucide="database" class="w-4 h-4"></i>
                    查看数据看板 (全量数据概览)
                </a>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl fade-in">
            <div class="flex justify-between items-center mb-10">
                <button onclick="prevQuestion()" id="prev-btn" class="text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-1 invisible">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    返回
                </button>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]" id="progress-text">载入中...</span>
                    <div class="w-32 md:w-48 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar h-full bg-indigo-500" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="w-10"></div> <!-- Spacer for centering -->
            </div>
            
            <div class="min-h-[140px] flex items-center justify-center text-center mb-12">
                <h2 id="question-title" class="serif text-2xl md:text-3xl font-bold text-slate-800 leading-snug">
                    你总是想尝试新鲜事物，讨厌重复和陈旧？
                </h2>
            </div>

            <div id="answers-container" class="grid grid-cols-1 gap-3 md:gap-4"></div>

            <!-- New Bottom Back Button -->
            <div id="bottom-back-container" class="mt-8 flex justify-center invisible">
                <button onclick="prevQuestion()" class="text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-full hover:bg-slate-50">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    返回上一问
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden glass rounded-[2.5rem] p-10 md:p-16 shadow-2xl text-center fade-in">
            <div class="mb-10">
                <div class="inline-block px-4 py-1.5 rounded-full bg-indigo-100 text-indigo-600 text-sm font-bold tracking-widest uppercase mb-4">测试报告</div>
                <h3 class="text-slate-400 text-lg md:text-xl font-medium">你的灵魂作曲家是</h3>
                <div class="mt-3 text-slate-400 text-sm font-medium">
                    累计完成：<span id="completion-count">--</span> 人次
                </div>
            </div>
            
            <div class="mb-12">
                <!-- Composer Image -->
                <div class="flex justify-center mb-8">
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                        <img id="result-image" src="" alt="Composer Portrait" class="relative w-48 h-48 md:w-56 md:h-56 rounded-full object-cover border-4 border-white shadow-2xl">
                    </div>
                </div>
                <h1 id="result-name" class="serif text-6xl md:text-8xl font-black text-slate-900 mb-8 tracking-tighter">贝多芬</h1>
                <div id="result-tags" class="flex flex-wrap justify-center gap-3 mb-10">
                    <!-- Tags will be inserted here -->
                </div>
            </div>

            <!-- Radar Chart Container -->
            <div class="mb-12 bg-white/50 p-6 md:p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <canvas id="radarChart" class="max-w-full mx-auto"></canvas>
            </div>

            <div class="bg-white p-8 md:p-12 rounded-[2.5rem] mb-12 shadow-sm border border-slate-100 relative text-left">
                <i data-lucide="quote" class="absolute top-6 left-6 w-8 h-8 text-indigo-100 rotate-180 opacity-50"></i>
                <p id="result-desc" class="text-slate-700 text-lg md:text-xl leading-relaxed serif italic relative z-10 indent-8">
                    你性格直白爽快，不绕弯子，敢怒敢言，绝不委屈自己。
                </p>
                <i data-lucide="quote" class="absolute bottom-6 right-6 w-8 h-8 text-indigo-100 opacity-50"></i>
            </div>

            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button onclick="location.reload()" class="bg-slate-900 hover:bg-black text-white px-10 py-4 rounded-full font-bold transition-all transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    再测一次
                </button>
            </div>
        </div>
    </div>

    <!-- “剧透模式”确认弹窗：默认隐藏；点击入口时显示 -->
    <div id="dashboard-gate" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/30 backdrop-blur-sm" onclick="handleDashboardGateBackdrop(event)">
        <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 md:p-10 shadow-2xl border border-white/50 text-center fade-in">
            <div class="mb-6 flex justify-center">
                <div class="bg-amber-500 p-3 rounded-2xl shadow-md rotate-3">
                    <i data-lucide="eye-off" class="w-8 h-8 text-white"></i>
                </div>
            </div>
            <h2 class="serif text-2xl md:text-3xl font-bold text-slate-800 mb-4 tracking-tight">剧透模式提示</h2>
            <p class="text-slate-600 text-base md:text-lg leading-relaxed max-w-md mx-auto">
                此功能用于作者调试与核对内容，属于剧透模式。是否继续进入？
            </p>
            <div class="mt-8 flex flex-col md:flex-row gap-3 justify-center">
                <button onclick="goToDashboard()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-full font-bold transition-all transform hover:scale-105 shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="door-open" class="w-5 h-5"></i>
                    坚持进入
                </button>
                <button onclick="closeDashboardGate()" class="bg-white hover:bg-slate-50 text-slate-700 px-8 py-4 rounded-full font-bold transition-all shadow-sm border border-slate-200 flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5 text-indigo-600"></i>
                    先做测试
                </button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // 打开确认弹窗：阻止 a 标签默认跳转，改成显示弹窗
        function openDashboardGate(e) {
            if (e) e.preventDefault();
            const gate = document.getElementById('dashboard-gate');
            if (!gate) return;
            gate.classList.remove('hidden');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // 关闭确认弹窗（留在当前页面继续做测试）
        function closeDashboardGate() {
            const gate = document.getElementById('dashboard-gate');
            if (!gate) return;
            gate.classList.add('hidden');
        }

        // 确认进入数据看板
        function goToDashboard() {
            window.location.href = 'list.html';
        }

        // 点击遮罩层空白处关闭弹窗（点击弹窗本体不关闭）
        function handleDashboardGateBackdrop(e) {
            const gate = document.getElementById('dashboard-gate');
            if (e.target === gate) closeDashboardGate();
        }

        // Esc 键关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDashboardGate();
        });
    </script>
</body>
</html>
